# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.crypto_keys_path: '%kernel.project_dir%/var/crypto'
    app.base_url: '%env(APP_BASE_URL)%'

    # Configuration entreprise pour Factur-X
    app.company.name: 'TechnoProd'
    app.company.siret: '12345678901234'
    app.company.address: '123 Avenue de la République, 75011 Paris'
    app.company.phone: '+33 1 23 45 67 89'
    app.company.email: 'contact@technoprod.fr'
    app.company.vat_number: 'FR12345678901'
    google.maps.api.key: '%env(GOOGLE_MAPS_API_KEY)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        
    # Service DashboardService public pour tests de performance
    App\Service\DashboardService:
        public: true

    # Configuration des services Admin avec interfaces
    App\Service\Admin\GroupeUtilisateurServiceInterface:
        class: App\Service\Admin\GroupeUtilisateurService
        
    App\Service\Admin\Interfaces\AdminDashboardServiceInterface:
        class: App\Service\Admin\AdminDashboardService

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    
    # Configuration du service d'intégrité des documents
    App\Service\DocumentIntegrityService:
        arguments:
            $cryptoKeysPath: '%app.crypto_keys_path%'
            $blockchainEnabled: false
            
    # Configuration du service Gmail avec signature d'entreprise par défaut
    App\Service\GmailMailerService:
        arguments:
            $companySignature: |
                Cordialement,<br>
                L'équipe TechnoProd<br>
                <strong>TechnoProd</strong><br>
                Email : contact@technoprod.fr<br>
                Tél : 01 23 45 67 89

    # Services de détection d'alertes
    App\Service\AlerteDetection\ClientSansContactDetector:
        tags: ['app.alerte_detector']

    App\Service\AlerteDetection\ContactSansAdresseDetector:
        tags: ['app.alerte_detector']

    App\Service\AlerteDetection\ConfigurableDetector:
        tags: ['app.alerte_detector']

    # Enregistrement automatique des détecteurs
    App\Service\AlerteManager:
        calls:
            - method: registerDetector
              arguments: ['@App\Service\AlerteDetection\ClientSansContactDetector']
            - method: registerDetector
              arguments: ['@App\Service\AlerteDetection\ContactSansAdresseDetector']
            - method: registerDetector
              arguments: ['@App\Service\AlerteDetection\ConfigurableDetector']
